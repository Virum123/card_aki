name: Update Card DB

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync

      - name: Rebuild card DB
        run: uv run python crawler/build_card_db.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cards.db data/cards_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-update card db"
            git push
          fi
